<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claudio Olmedo</title>
    <meta name="description" content="Acesse o site oficial de Claudio Olmedo escaneando o código QR.">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .qr-container {
            width: 85vmin;
            height: 85vmin;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .qr-image {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            aspect-ratio: 1 / 1;
            display: block;
        }
    </style>
</head>
<body>
    <div class="qr-container">
        <img src="qrcode.png" alt="Código QR para claudioolmedo.com" class="qr-image">
    </div>
</body>
</html>
